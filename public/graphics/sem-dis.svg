<svg width="100%" viewBox="0 0 680 440" role="img" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Input box -->
  <rect x="20" y="175" width="130" height="100" rx="8" fill="#D3D1C7" stroke="#5F5E5A" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="85" y="200" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">AUT object</text>
  <text font-family="sans-serif" font-size="12" x="85" y="218" text-anchor="middle" dominant-baseline="central" fill="#5F5E5A">e.g. "brick"</text>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="85" y="234" text-anchor="middle" dominant-baseline="central" fill="#2C2C2A">+ response</text>
  <text font-family="sans-serif" font-size="12" x="85" y="258" text-anchor="middle" fill="#5F5E5A">"doorstop"</text>

  <!-- Spine -->
  <line x1="150" y1="210" x2="175" y2="210" stroke="#888780" stroke-width="1"/>
  <line x1="175" y1="60" x2="175" y2="320" stroke="#888780" stroke-width="1"/>

  <!-- Branches -->
  <line x1="175" y1="60"  x2="192" y2="60"  stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="175" y1="120" x2="192" y2="120" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="175" y1="180" x2="192" y2="180" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="175" y1="260" x2="192" y2="260" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="175" y1="320" x2="192" y2="320" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- CBOW models -->
  <rect x="192" y="40" width="130" height="40" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="257" y="60" text-anchor="middle" dominant-baseline="central" fill="#26215C">CBOW 1</text>
  <rect x="192" y="100" width="130" height="40" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="257" y="120" text-anchor="middle" dominant-baseline="central" fill="#26215C">CBOW 2</text>
  <rect x="192" y="160" width="130" height="40" rx="8" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="257" y="180" text-anchor="middle" dominant-baseline="central" fill="#26215C">CBOW 3</text>

  <!-- Count models -->
  <rect x="192" y="240" width="130" height="40" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="257" y="260" text-anchor="middle" dominant-baseline="central" fill="#04342C">Count model 1</text>
  <rect x="192" y="300" width="130" height="40" rx="8" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="257" y="320" text-anchor="middle" dominant-baseline="central" fill="#04342C">Count model 2</text>

  <!-- Arrows to SemDis -->
  <line x1="322" y1="60"  x2="388" y2="185" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="322" y1="120" x2="388" y2="195" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="322" y1="180" x2="388" y2="203" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="322" y1="260" x2="388" y2="215" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="322" y1="320" x2="388" y2="225" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- SemDis box -->
  <rect x="390" y="165" width="130" height="70" rx="8" fill="#B5D4F4" stroke="#185FA5" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="455" y="193" text-anchor="middle" dominant-baseline="central" fill="#042C53">SemDis</text>
  <text font-family="sans-serif" font-size="12" x="455" y="213" text-anchor="middle" dominant-baseline="central" fill="#185FA5">averages scores</text>

  <!-- Arrow to output -->
  <line x1="520" y1="200" x2="558" y2="200" stroke="#888780" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Output box -->
  <rect x="560" y="165" width="100" height="70" rx="8" fill="#C0DD97" stroke="#3B6D11" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="610" y="190" text-anchor="middle" dominant-baseline="central" fill="#173404">Semantic</text>
  <text font-family="sans-serif" font-size="14" font-weight="500" x="610" y="207" text-anchor="middle" dominant-baseline="central" fill="#173404">distance</text>
  <text font-family="sans-serif" font-size="12" x="610" y="224" text-anchor="middle" dominant-baseline="central" fill="#3B6D11">score</text>

  <!-- Legend -->
  <rect x="192" y="368" width="14" height="14" rx="3" fill="#CECBF6" stroke="#534AB7" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" x="212" y="375" dominant-baseline="central" fill="#5F5E5A">Predict models</text>
  <rect x="320" y="368" width="14" height="14" rx="3" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text font-family="sans-serif" font-size="12" x="340" y="375" dominant-baseline="central" fill="#5F5E5A">Count models</text>
</svg>